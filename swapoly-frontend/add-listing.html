<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SwapPoly | Add Listing</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <header class="topbar">
      <h1 class="app-title">Add Listing</h1>
    </header>

    <main class="page">
      <section class="listings-section" aria-label="Add listing form">
        <div class="listing-card">
          <div class="listing-content">
            <h2 class="listing-title">Create a new listing</h2>
            <label>
              Title
              <input class="search-input" type="text" placeholder="Listing title" />
            </label>
            <label>
              Price
              <input class="search-input" type="number" placeholder="Price" />
            </label>
            <label>
              Image
              <input class="search-input" type="url" placeholder="Image URL" />
            </label>
            <label>
              Category
              <input class="search-input" type="text" placeholder="Category" />
            </label>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
