<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SwapPoly | Add Listing</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <header class="topbar">
      <h1 class="app-title">Add Listing</h1>
    </header>

    <main class="page">
      <section class="listings-section" aria-label="Add listing form">
        <div class="listing-card">
          <form id="add-listing-form" class="listing-content" novalidate>
            <h2 class="listing-title">Create a new listing</h2>
            <div id="form-status" class="status-message" role="status" aria-live="polite"></div>
            <label>
              Title
              <input
                id="title"
                name="title"
                class="search-input"
                type="text"
                placeholder="Listing title"
                required
              />
            </label>
            <label>
              Price
              <input
                id="price"
                name="price"
                class="search-input"
                type="number"
                min="0.01"
                step="0.01"
                placeholder="Price"
                required
              />
            </label>
            <label>
              Image
              <input
                id="image_url"
                name="image_url"
                class="search-input"
                type="url"
                placeholder="Image URL"
                required
              />
            </label>
            <label>
              Category
              <select
                id="category"
                name="category"
                class="search-input"
                required
              >
                <option value="">Select Category</option>
                <option value="Drawing Gear">Drawing Gear</option>
                <option value="Lab Essentials">Lab Essentials</option>
                <option value="Books">Books</option>
                <option value="Electronics">Electronics</option>
              </select>
            </label>
            <button id="submit-btn" class="chat-btn" type="submit">Create Listing</button>
          </form>
        </div>
      </section>
    </main>

    <script type="module" src="./js/add-listing.js"></script>
  </body>
</html>
