<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SwapPoly | Login</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-content">
        <h1 class="app-title">SwapPoly</h1>
      </div>
    </header>

    <main class="page">
      <section class="listings-section" aria-label="Login form">
        <div class="listing-card">
          <div class="listing-content">
            <h2 class="listing-title">Continue to SwapPoly</h2>
            <div id="login-status" class="status-message" role="status" aria-live="polite"></div>
            <input
              id="login-name"
              class="search-input"
              type="text"
              placeholder="Enter your name"
              autocomplete="name"
            />
            <button id="continue-btn" class="chat-btn" type="button">Continue</button>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="./js/login.js"></script>
  </body>
</html>
